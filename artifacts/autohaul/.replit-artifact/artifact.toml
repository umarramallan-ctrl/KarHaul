kind = "web"
  previewPath = "/"
title = "KarHaul"
  version = "1.0.0"
  id = "artifacts/autohaul"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 5173

  [services.development]
  run = "pnpm --filter @workspace/autohaul run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/autohaul", "run", "build" ]
  publicDir = "artifacts/autohaul/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "5173"
  BASE_PATH = "/"
