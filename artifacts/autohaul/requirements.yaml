packages:
  "framer-motion": "For smooth page transitions and beautiful staggered entry animations"
  "date-fns": "For formatting pickup/delivery dates and relative times (e.g. '2 days ago')"
  "recharts": "For the Admin Dashboard statistics and charts"
  "react-hook-form": "For robust form state management in posting loads and profile"
  "@hookform/resolvers": "For integrating Zod validation with react-hook-form"
  "zod": "For schema validation on forms"

